<style>
/* ============================================
   CRUDE PRODUCTION LIVE
   ============================================ */

:root {
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  --text-xs: clamp(0.6875rem, 0.65rem + 0.15vw, 0.75rem);
  --text-sm: clamp(0.8125rem, 0.78rem + 0.15vw, 0.875rem);
  --text-base: clamp(0.875rem, 0.83rem + 0.2vw, 1rem);
  --text-lg: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-xl: clamp(1.125rem, 1.05rem + 0.35vw, 1.375rem);

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);

  --bg-base: #080c12;
  --bg-surface: #0f1520;
  --bg-raised: #161e2c;
  --bg-hover: #1e2840;
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-default: rgba(255, 255, 255, 0.1);
  --border-emphasis: rgba(255, 255, 255, 0.18);
  --text-primary: #edf2f7;
  --text-secondary: #94a3b8;
  --text-faint: #5a6a82;
  --accent: #00d4aa;
  --accent-dim: rgba(0, 212, 170, 0.12);
  --accent-glow: rgba(0, 212, 170, 0.3);
  --warning: #f59e0b;
  --arrow-color: rgba(0, 212, 170, 0.55);
  --connector-color: rgba(0, 212, 170, 0.25);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============================================
   Top Bar
   ============================================ */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar-left { display: flex; align-items: center; gap: var(--space-3); }
.logo-icon { color: var(--accent); }
.top-bar h1 { font-size: var(--text-xl); font-weight: 700; letter-spacing: -0.02em; }
.top-bar-right { display: flex; align-items: center; gap: var(--space-3); }

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse-dot 2s ease infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { opacity: 0.6; box-shadow: 0 0 0 6px transparent; }
}

.status-text {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.last-updated {
  font-size: var(--text-xs);
  color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
}

.btn-refresh {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  background: var(--bg-raised);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
}

.btn-refresh:hover { background: var(--bg-hover); color: var(--accent); border-color: var(--accent); }
.btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================
   Flow Container
   ============================================ */
.flow-container {
  flex: 1;
  padding: var(--space-8) var(--space-6);
  max-width: 1500px;
  margin: 0 auto;
  width: 100%;
}

.flow-row { display: grid; gap: var(--space-5); }
.flow-row.top-row { grid-template-columns: repeat(4, 1fr); }
.flow-row.bottom-row { grid-template-columns: repeat(4, 1fr); }
.empty-cell { display: block; }

/* ============================================
   Vertical Connector
   ============================================ */
.vertical-connector {
  display: flex;
  justify-content: center;
  height: 52px;
  max-width: 1500px;
  margin: 0 auto;
  width: 100%;
}

.vert-line-wrap {
  width: calc(25% - 10px);
  display: flex;
  justify-content: center;
}

.vert-line {
  width: 3px;
  height: 100%;
  background: linear-gradient(to bottom, var(--connector-color), var(--arrow-color));
  border-radius: 2px;
  position: relative;
}

.vert-line::after {
  content: '';
  position: absolute;
  bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 10px solid var(--arrow-color);
}

/* ============================================
   Station Card
   ============================================ */
.station {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 0.3s var(--ease-out);
  position: relative;
  animation: fadeInUp 0.4s var(--ease-out) both;
}

.station:hover {
  border-color: var(--border-emphasis);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* Station Header with photo */
.station-header {
  position: relative;
  height: 140px;
  display: flex;
  align-items: flex-end;
  padding: var(--space-4);
  overflow: hidden;
}

.station-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7) saturate(0.85);
  transition: filter 0.3s var(--ease-out);
}

.station:hover .station-image {
  filter: brightness(0.8) saturate(1);
}

.station-label {
  position: relative;
  z-index: 2;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
  margin: calc(-1 * var(--space-4));
  margin-top: auto;
  padding: var(--space-6) var(--space-4) var(--space-3);
  width: calc(100% + var(--space-4) * 2);
}

.station-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}

.station-name {
  font-size: var(--text-sm);
  font-weight: 700;
  color: #fff;
}

.station-batch-count {
  font-size: var(--text-xs);
  color: rgba(255,255,255,0.85);
  font-family: 'JetBrains Mono', monospace;
  position: absolute;
  top: var(--space-3);
  right: var(--space-3);
  background: rgba(0, 0, 0, 0.55);
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  z-index: 3;
  backdrop-filter: blur(4px);
}

/* ============================================
   FULL Station Overlay
   ============================================ */
.station-full {
  border-color: rgba(239, 68, 68, 0.4);
  box-shadow: 0 0 20px rgba(239, 68, 68, 0.2), 0 0 40px rgba(239, 68, 68, 0.08);
}

.station-full:hover {
  border-color: rgba(239, 68, 68, 0.6);
  box-shadow: 0 0 28px rgba(239, 68, 68, 0.3), 0 0 56px rgba(239, 68, 68, 0.12);
}

.station-full .station-image {
  filter: brightness(0.45) saturate(0.6);
}

.station-full:hover .station-image {
  filter: brightness(0.55) saturate(0.7);
}

.full-overlay {
  position: absolute;
  inset: 0;
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, rgba(239, 68, 68, 0.25) 0%, rgba(239, 68, 68, 0.08) 60%, transparent 80%);
  pointer-events: none;
  animation: fullPulse 2.5s ease-in-out infinite;
}

@keyframes fullPulse {
  0%, 100% { background: radial-gradient(ellipse at center, rgba(239, 68, 68, 0.25) 0%, rgba(239, 68, 68, 0.08) 60%, transparent 80%); }
  50% { background: radial-gradient(ellipse at center, rgba(239, 68, 68, 0.35) 0%, rgba(239, 68, 68, 0.14) 60%, transparent 80%); }
}

.full-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.5rem, 2vw, 2rem);
  font-weight: 800;
  color: #ef4444;
  letter-spacing: 0.2em;
  text-shadow: 0 0 20px rgba(239, 68, 68, 0.6), 0 0 40px rgba(239, 68, 68, 0.3);
  animation: fullTextGlow 2.5s ease-in-out infinite;
}

@keyframes fullTextGlow {
  0%, 100% { text-shadow: 0 0 20px rgba(239, 68, 68, 0.6), 0 0 40px rgba(239, 68, 68, 0.3); opacity: 0.9; }
  50% { text-shadow: 0 0 30px rgba(239, 68, 68, 0.8), 0 0 60px rgba(239, 68, 68, 0.5); opacity: 1; }
}

.station-full .capacity-fill {
  background: #ef4444 !important;
}

/* Capacity bar */
.capacity-bar {
  height: 3px;
  background: rgba(255, 255, 255, 0.05);
}

.capacity-fill {
  height: 100%;
  border-radius: 0 2px 2px 0;
  transition: width 0.6s var(--ease-out);
}

/* ============================================
   Flow Arrows
   ============================================ */
.station-with-arrow-right { position: relative; }

.station-with-arrow-right::after {
  content: '';
  position: absolute;
  top: 70px;
  right: -14px;
  width: 10px; height: 3px;
  background: var(--connector-color);
  z-index: 2;
}

.station-with-arrow-right::before {
  content: '';
  position: absolute;
  top: 64px;
  right: -20px;
  width: 0; height: 0;
  border-top: 7px solid transparent;
  border-bottom: 7px solid transparent;
  border-left: 9px solid var(--arrow-color);
  z-index: 2;
}

.station-with-arrow-left { position: relative; }

.station-with-arrow-left::after {
  content: '';
  position: absolute;
  top: 70px;
  left: -14px;
  width: 10px; height: 3px;
  background: var(--connector-color);
  z-index: 2;
}

.station-with-arrow-left::before {
  content: '';
  position: absolute;
  top: 64px;
  left: -20px;
  width: 0; height: 0;
  border-top: 7px solid transparent;
  border-bottom: 7px solid transparent;
  border-right: 9px solid var(--arrow-color);
  z-index: 2;
}

/* ============================================
   Batch Slots
   ============================================ */
.station-batches {
  padding: var(--space-3);
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.batch-card {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: 7px var(--space-3);
  background: var(--bg-raised);
  border: 1px solid rgba(0, 212, 170, 0.1);
  border-radius: var(--radius-sm);
  transition: all 0.2s var(--ease-out);
}

.batch-card:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
}

.batch-indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.batch-indicator.active {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent-glow);
}

.batch-indicator.idle { background: var(--text-faint); }
.batch-info { flex: 1; min-width: 0; }

.batch-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.batch-meta {
  font-size: var(--text-xs);
  color: var(--text-faint);
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.empty-slot {
  padding: 7px var(--space-3);
  border: 1px dashed rgba(255, 255, 255, 0.04);
  border-radius: var(--radius-sm);
  min-height: 32px;
}

/* ============================================
   Summary Bar
   ============================================ */
.summary-bar {
  display: flex;
  gap: var(--space-8);
  margin-top: var(--space-8);
  padding: var(--space-5) var(--space-6);
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
}

.summary-item { display: flex; flex-direction: column; gap: 2px; }

.summary-label {
  font-size: var(--text-xs);
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

.summary-value {
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--text-primary);
}

.summary-value.accent { color: var(--accent); }
.summary-value.mono { font-family: 'JetBrains Mono', monospace; font-size: var(--text-sm); }

/* ============================================
   Footer
   ============================================ */
.app-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  font-size: var(--text-xs);
  color: var(--text-faint);
}

.app-footer a { color: var(--text-faint); text-decoration: none; }
.app-footer a:hover { color: var(--accent); }

/* ============================================
   Animations
   ============================================ */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.flow-row.top-row .station:nth-child(1) { animation-delay: 0.05s; }
.flow-row.top-row .station:nth-child(2) { animation-delay: 0.1s; }
.flow-row.top-row .station:nth-child(3) { animation-delay: 0.15s; }
.flow-row.top-row .station:nth-child(4) { animation-delay: 0.2s; }
.flow-row.bottom-row .station:nth-child(1) { animation-delay: 0.3s; }
.flow-row.bottom-row .station:nth-child(2) { animation-delay: 0.35s; }
.flow-row.bottom-row .station:nth-child(3) { animation-delay: 0.4s; }
.flow-row.bottom-row .station:nth-child(4) { animation-delay: 0.45s; }

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 1100px) {
  .flow-row.top-row,
  .flow-row.bottom-row { grid-template-columns: repeat(2, 1fr); }
  .empty-cell { display: none; }
  .station-with-arrow-right::after, .station-with-arrow-right::before,
  .station-with-arrow-left::after, .station-with-arrow-left::before { display: none; }
  .vertical-connector { display: none; }
  .summary-bar { flex-wrap: wrap; gap: var(--space-5); }
}

@media (max-width: 640px) {
  .top-bar { padding: var(--space-3) var(--space-4); }
  .top-bar h1 { font-size: var(--text-lg); }
  .flow-container { padding: var(--space-4) var(--space-3); }
  .flow-row.top-row, .flow-row.bottom-row { grid-template-columns: 1fr; }
  .summary-bar { flex-direction: column; gap: var(--space-3); }
}

</style>
</head>

// ============================================
// Rendering
// ============================================

function renderStation(stationDef, batches, showArrow, arrowDir) {
  var items = batches.slice(0, MAX_BATCHES_PER_STATION);
  var emptySlots = MAX_BATCHES_PER_STATION - items.length;
  var fillPercent = Math.round((items.length / MAX_BATCHES_PER_STATION) * 100);

  var batchCards = items.map(function(batch) {
    var batchName = batch['Batch Name'] || batch.name || 'Unnamed';
    var date = batch['Date'] || '';
    var pH = batch['Final pH'] || '';
    var operator = batch['Operator Name'] || '';
    var time = batch['Time'] || '';
    var isActive = date && isRecent(date);

    var metaParts = [];
    if (date) metaParts.push('<span class="batch-date">' + formatDate(date) + '</span>');
    if (time) metaParts.push('<span>' + escapeHtml(time) + '</span>');
    if (pH) metaParts.push('<span>pH ' + escapeHtml(pH) + '</span>');
    if (operator) metaParts.push('<span>' + escapeHtml(operator) + '</span>');

    return '<div class="batch-card">' +
      '<span class="batch-indicator ' + (isActive ? 'active' : 'idle') + '"></span>' +
      '<div class="batch-info">' +
        '<div class="batch-name">' + escapeHtml(batchName) + '</div>' +
        (metaParts.length > 0 ? '<div class="batch-meta">' + metaParts.join('') + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  var emptySlotHtml = '';
  for (var i = 0; i < emptySlots; i++) {
    emptySlotHtml += '<div class="empty-slot"></div>';
  }

  var arrowClass = '';
  if (showArrow) {
    arrowClass = arrowDir === 'left' ? 'station-with-arrow-left' : 'station-with-arrow-right';
  }

  // Capacity bar color
  var capColor = fillPercent >= 80 ? 'var(--accent)' : fillPercent >= 40 ? 'var(--warning)' : 'var(--text-faint)';

  // Get the base64 image for this station
  var imgSrc = (typeof STATION_IMAGES !== 'undefined') ? STATION_IMAGES[stationDef.stationNum] : '';

  // Determine if station is FULL
  // Ultrasound is full at 4, Pre-Decanter and Pre-Filter are full at 5
  var fullThreshold = MAX_BATCHES_PER_STATION;
  if (stationDef.groupTitle === 'Biomass Prep & Ultrasound') {
    fullThreshold = 4;
  }
  var isFull = items.length >= fullThreshold;
  var fullClass = isFull ? ' station-full' : '';

  return '<div class="station ' + arrowClass + fullClass + '">' +
    '<div class="station-header" style="background:' + stationDef.gradient + '">' +
      (imgSrc ? '<img class="station-image" src="' + imgSrc + '" alt="' + escapeHtml(stationDef.shortName) + '">' : '') +
      (isFull ? '<div class="full-overlay"><span class="full-text">FULL</span></div>' : '') +
      '<div class="station-label">' +
        '<div class="station-number">Station ' + stationDef.stationNum + '</div>' +
        '<div class="station-name">' + escapeHtml(stationDef.shortName) + '</div>' +
      '</div>' +
      '<div class="station-batch-count">' + items.length + '/' + MAX_BATCHES_PER_STATION + '</div>' +
    '</div>' +
    '<div class="capacity-bar"><div class="capacity-fill" style="width:' + fillPercent + '%;background:' + capColor + '"></div></div>' +
    '<div class="station-batches">' +
      batchCards +
      emptySlotHtml +
    '</div>' +
  '</div>';
}

function renderFlow(stationData) {
  var container = document.getElementById('flowContainer');

  var topStations = STATIONS.slice(0, 4);
  var bottomStations = STATIONS.slice(4, 8);

  // === TOP ROW ===
  var html = '<div class="flow-row top-row">';
  topStations.forEach(function(station, i) {
    var batches = stationData[station.groupTitle] || [];
    var showArrow = i < topStations.length - 1;
    html += renderStation(station, batches, showArrow, 'right');
  });
  html += '</div>';

  // === VERTICAL CONNECTOR ===
  html += '<div class="vertical-connector"><div class="vert-line-wrap"><div class="vert-line"></div></div></div>';

  // === BOTTOM ROW (left to right: 5, 6, 7, 8) ===
  html += '<div class="flow-row bottom-row">';
  bottomStations.forEach(function(station, i) {
    var batches = stationData[station.groupTitle] || [];
    var showArrow = i < bottomStations.length - 1;
    html += renderStation(station, batches, showArrow, 'right');
  });
  html += '</div>';

  // === SUMMARY BAR ===
  var totalBatches = 0;
  var activeBatches = 0;
  var stationsWithData = 0;
  STATIONS.forEach(function(s) {
    var b = stationData[s.groupTitle] || [];
    totalBatches += b.length;
    if (b.length > 0) stationsWithData++;
    b.forEach(function(batch) {
      if (batch['Date'] && isRecent(batch['Date'])) activeBatches++;
    });
  });

  html += '<div class="summary-bar">' +
    '<div class="summary-item"><span class="summary-label">Total Batches</span><span class="summary-value">' + totalBatches + '</span></div>' +
    '<div class="summary-item"><span class="summary-label">Active (Last 3 Days)</span><span class="summary-value accent">' + activeBatches + '</span></div>' +
    '<div class="summary-item"><span class="summary-label">Active Stations</span><span class="summary-value">' + stationsWithData + ' / ' + STATIONS.length + '</span></div>' +
    '<div class="summary-item"><span class="summary-label">Source</span><span class="summary-value mono">Monday.com</span></div>' +
  '</div>';

  container.innerHTML = html;
}

var BOARD_ID = '18402821844';

function fetchLiveData() {
  var query = '{ boards(ids: [' + BOARD_ID + ']) { groups { id title } items_page(limit: 200) { items { id name group { id title } column_values { id text } } } } }';

  return fetch(MONDAY_API, {
    method: 'POST',
    headers: {
      'Authorization': MONDAY_TOKEN,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ query: query })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    var items = result.data.boards[0].items_page.items;
    var stationData = {};

    // Initialize all groups
    STATIONS.forEach(function(s) { stationData[s.groupTitle] = []; });

    items.forEach(function(item) {
      var groupTitle = item.group.title;
      var cols = {};
      item.column_values.forEach(function(cv) { cols[cv.id] = cv.text; });

      var batchObj = {
        id: item.id,
        name: item.name,
        'Batch Name': cols['text_mm166879'] || item.name,
        'Date': cols['date4'] || '',
        'Operator Name': cols['text_mm16pd4m'] || '',
        'Time': cols['text_mm1635'] || '',
        'Final pH': cols['numeric_mm16a4w8'] || ''
      };

      if (stationData[groupTitle] !== undefined) {
        stationData[groupTitle].push(batchObj);
      }
    });

    // Filter Press is a processing station - always empty
    stationData['Filter Press'] = [];

    return stationData;
  });
}

// ============================================
// Helpers
// ============================================

function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    var d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch (e) {
    return dateStr;
  }
}

function isRecent(dateStr) {
  if (!dateStr) return false;
  try {
    var d = new Date(dateStr + 'T00:00:00');
    var now = new Date();
    var diffDays = (now - d) / (1000 * 60 * 60 * 24);
    return diffDays <= 3;
  } catch (e) {
    return false;
  }
}

function updateTimestamp() {
  var el = document.getElementById('lastUpdated');
  el.textContent = 'Synced Mar 6, 6:17 PM';
}

// ============================================
// Main
// ============================================

document.addEventListener('DOMContentLoaded', function() {
  // Start with embedded data for instant render
  renderFlow(EMBEDDED_DATA);
  updateTimestamp();

  // Then fetch live data
  fetchLiveData().then(function(liveData) {
    renderFlow(liveData);
    var el = document.getElementById('lastUpdated');
    var now = new Date();
    el.textContent = 'Live \u2014 ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }).catch(function(err) {
    console.error('API fetch error:', err);
  });

  // Auto-refresh every 60 seconds
  setInterval(function() {
    fetchLiveData().then(function(liveData) {
      renderFlow(liveData);
      var el = document.getElementById('lastUpdated');
      var now = new Date();
      el.textContent = 'Live \u2014 ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }).catch(function(err) {
      console.error('Refresh error:', err);
    });
  }, 60000);

  // Manual refresh button
  document.getElementById('btnRefresh').addEventListener('click', function() {
    var btn = document.getElementById('btnRefresh');
    btn.classList.add('spinning');
    fetchLiveData().then(function(liveData) {
      renderFlow(liveData);
      var el = document.getElementById('lastUpdated');
      var now = new Date();
      el.textContent = 'Live \u2014 ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      btn.classList.remove('spinning');
    }).catch(function(err) {
      console.error('Refresh error:', err);
      btn.classList.remove('spinning');
    });
  });
});
